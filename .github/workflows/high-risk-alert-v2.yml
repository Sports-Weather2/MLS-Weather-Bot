name: High-Risk Weather Alert

on:
  schedule:
    # 10:00 AM PT = 17:00 UTC (daily)
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  high-risk-alert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run high-risk alert check
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL_HIGH_RISK: ${{ secrets.SLACK_WEBHOOK_URL_HIGH_RISK }}
        run: python -m src.high_risk_alert
      
      - name: Log completion
        run: echo "✅ High-risk alert check completed at $(date)"
